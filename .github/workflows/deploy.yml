name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /singh-blog   # 👈 CHANGE THIS IF YOUR PATH IS DIFFERENT

            echo "Pulling latest code..."
            git pull origin main

            echo "Backend update..."
            cd backend
            npm install
            pm2 restart backend || pm2 start index.js --name backend

            echo "Frontend update..."
            cd ../frontend
            npm install
            npm run build
            pm2 restart frontend || pm2 start npm --name frontend -- start

            echo "Deployment completed 🚀"1~name: Deploy to EC2

