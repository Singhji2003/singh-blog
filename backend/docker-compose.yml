version: "3.9"

services:
  redis:
    image: redis:latest
    container_name: singh-blog-redis
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: singh-blog-backend
    ports:
      - "5000:5000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
